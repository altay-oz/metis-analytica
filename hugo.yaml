      section2:
        title: Services
        subtitle: The right level of support for every stage of your technology strategy.
        features:
        - title: TechLand — Strategic Technology Intelligence
          text: TechLand gives you a precise, evidence-based picture of any technology
                landscape — who owns what, where the field is heading, and where the
                white-space  spaces are. Built on PATSTAT and DOCDB, refreshed weekly,
                and designed for decision-makers who need reliable, reproducible analysis
                they can act on. Whether you are shaping your R&D agenda, evaluating an
                acquisition target, or mapping your innovation position, TechLand gives
                you the intelligence to make the right call — independently, at your own pace.
        - title: Consultancy — Expert Support When You Need It
          text: Not every organisation needs the same level of support. Some clients know
                exactly what they are looking for and use TechLand independently. Others
                need help interpreting results, translating findings into strategic
                recommendations, or running the analysis jointly. We adapt to your needs —
                from a one-off interpretation session to a full joint analysis engagement
                where we work alongside your team, shape the strategic implications together,
                and transfer the capability so you can continue independently. All engagements
                are conducted under NDA, with one client per sector at a time — so your
                strategic intelligence stays exclusively yours.
      section3:
        title: TechLand
        subtitle: The strategic intelligence tool decision-makers have been missing — built
                  on PATSTAT and DOCDB, refreshed weekly, covering over 80 million granted
                  patents across all major offices
        image: techland_main_page.png
        buttonText: See all features
        buttonLink: "/techlandfeatures"
